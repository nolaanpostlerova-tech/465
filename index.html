<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Configurações de Privacidade</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;900&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Inter',sans-serif;
}

body{
height:200vh;
background:linear-gradient(120deg,#0f172a,#1e293b);
}

/* OVERLAY */
.overlay{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.6);
backdrop-filter:blur(8px);
display:flex;
align-items:center;
justify-content:center;
z-index:999;
}

/* BOX */
.box{
width:95%;
max-width:480px;
background:#fff;
border-radius:20px;
padding:25px;
text-align:center;
animation:pop .4s ease;
}

/* ICON */
.icon{
font-size:40px;
margin-bottom:10px;
}

/* TITULO */
h1{
font-size:20px;
font-weight:800;
margin-bottom:5px;
}

/* SUB */
.sub{
font-size:13px;
color:#64748b;
margin-bottom:15px;
}

/* ALERTA */
.alert{
background:#fff7ed;
color:#b45309;
padding:10px;
border-radius:10px;
font-size:12px;
margin-bottom:15px;
}

/* BOTÃO PRINCIPAL */
.btn-main{
width:100%;
padding:16px;
border:none;
border-radius:12px;
background:linear-gradient(90deg,#22c55e,#16a34a);
color:#fff;
font-size:16px;
font-weight:700;
cursor:pointer;
margin-top:10px;
box-shadow:0 10px 30px rgba(34,197,94,0.4);
transition:.2s;
}

.btn-main:hover{
transform:scale(1.03);
}

/* BOTÕES SECUNDÁRIOS */
.options{
margin-top:10px;
display:flex;
justify-content:space-between;
font-size:12px;
}

.options button{
background:none;
border:none;
color:#64748b;
cursor:pointer;
}

/* LOADING */
.loading{
display:none;
margin-top:15px;
font-size:13px;
color:#16a34a;
font-weight:600;
}

/* ANIMAÇÃO */
@keyframes pop{
from{transform:scale(.8);opacity:0}
to{transform:scale(1);opacity:1}
}

</style>
</head>

<body>

<div class="overlay" id="box">

<div class="box">

<div class="icon">🔒</div>

<h1>Verificação de Segurança</h1>

<div class="sub">
Estamos validando seu acesso para liberar o conteúdo com segurança.
</div>

<div class="alert">
⚠️ Últimos acessos disponíveis hoje — prossiga para continuar
</div>

<button class="btn-main" onclick="aceitar()">
Continuar com segurança →
</button>

<div class="options">
<button onclick="rejeitar()">Recusar</button>
<button onclick="personalizar()">Configurar</button>
</div>

<div class="loading" id="loading">
🔄 Processando acesso...
</div>

</div>

</div>

<script>

/* 🔥 LINKS */
const LINK_ACEITAR = "https://seulink.com"
const LINK_REJEITAR = "https://seulink2.com"
const LINK_PERSONALIZAR = "https://seulink3.com"

/* NÃO MOSTRAR NOVAMENTE */
if(localStorage.getItem("choice")){
document.getElementById("box").style.display="none"
}

/* FUNÇÃO PRINCIPAL (COM DELAY = MAIS CONVERSÃO) */
function aceitar(){
document.getElementById("loading").style.display="block"

setTimeout(()=>{
localStorage.setItem("choice","accepted")
window.location.href = LINK_ACEITAR
}, 1200)
}

function rejeitar(){
localStorage.setItem("choice","rejected")
window.location.href = LINK_REJEITAR
}

function personalizar(){
localStorage.setItem("choice","custom")
window.location.href = LINK_PERSONALIZAR
}

</script>

</body>
</html>
